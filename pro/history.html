<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#16a34a">
<title>History — Bullzeeker Pro</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2316a34a' rx='20'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3E🎯%3C/text%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

<header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <a href="./dashboard.html" class="bg-green-600 w-8 h-8 rounded-lg flex items-center justify-center hover:bg-green-700">
        <span class="text-lg">🎯</span>
      </a>
      <div>
        <h1 class="font-bold text-gray-900 leading-tight">📊 History</h1>
        <p class="text-xs text-gray-500">Past scan results</p>
      </div>
    </div>
    <a href="./dashboard.html" class="text-sm text-gray-600 hover:text-green-600 px-3 py-1.5 rounded-md hover:bg-gray-100">← Dashboard</a>
  </div>
</header>

<!-- Disclaimer banner -->
<div class="bg-amber-50 border-b-2 border-amber-300">
  <div class="max-w-6xl mx-auto px-4 py-2.5 flex items-center gap-2 text-amber-900 text-sm">
    <span class="text-base">⚠️</span>
    <span><strong>เป็นเพียงข้อมูลในการเรียนรู้ ไม่ใช่คำแนะนำในการลงทุนใดๆ ทั้งสิ้น</strong></span>
  </div>
</div>

<main class="max-w-6xl mx-auto px-4 py-6">
  <div id="loading" class="text-center py-20">
    <div class="inline-block w-10 h-10 border-4 border-green-200 border-t-green-600 rounded-full animate-spin"></div>
  </div>

  <div id="empty" class="hidden bg-white rounded-2xl p-12 text-center border border-gray-200">
    <span class="text-5xl">📭</span>
    <p class="mt-4 text-gray-500">ยังไม่มี history — รัน scanner วันแรกก่อน</p>
  </div>

  <!-- Date list -->
  <div id="dates-list" class="hidden space-y-3"></div>

  <!-- Selected date detail -->
  <div id="date-detail" class="hidden mt-6"></div>
</main>

<script src="./assets/auth.js"></script>
<script src="./assets/app.js"></script>
<script>
  Auth.requireAuth();

  async function loadDateDetail(date) {
    const detailEl = document.getElementById("date-detail");
    detailEl.classList.remove("hidden");
    detailEl.innerHTML = `<div class="bg-white rounded-2xl p-6 border border-gray-200 text-center text-gray-500">
      <div class="inline-block w-8 h-8 border-4 border-green-200 border-t-green-600 rounded-full animate-spin"></div>
    </div>`;
    detailEl.scrollIntoView({ behavior: "smooth", block: "start" });

    try {
      const data = await App.loadHistoryDate(date);
      const regime = data.market_regime.uptrend ? "🟢 UPTREND" : "🔴 DOWN";
      const hc = data.high_conviction.slice(0, 12).map(h =>
        `<span class="inline-block px-2 py-1 bg-orange-100 text-orange-700 rounded text-sm font-semibold">${h.ticker} <small class="opacity-60">${h.count}/4</small></span>`
      ).join(" ");

      const sections = data.strategies.map(s => `
        <div class="bg-white rounded-xl p-4 border border-gray-200 mt-3">
          <div class="flex justify-between items-baseline mb-2">
            <h3 class="font-semibold text-gray-900">${s.label}</h3>
            <span class="text-sm text-green-600 font-semibold">${s.counts.buy} BUY</span>
          </div>
          ${s.buys.length === 0 ? '<p class="text-sm text-gray-400">ไม่มีสัญญาณ</p>' :
            `<div class="flex flex-wrap gap-2">${s.buys.slice(0, 30).map(b =>
              `<a href="https://finance.yahoo.com/quote/${b.ticker}" target="_blank" rel="noopener" class="text-sm bg-gray-100 hover:bg-green-100 text-gray-700 px-2 py-1 rounded">${b.ticker}</a>`
            ).join("")}${s.buys.length > 30 ? `<span class="text-xs text-gray-400 self-center">+${s.buys.length - 30} more</span>` : ""}</div>`
          }
        </div>
      `).join("");

      detailEl.innerHTML = `
        <div class="bg-white rounded-2xl border border-gray-200 p-6">
          <div class="flex flex-wrap justify-between items-baseline gap-2 mb-4">
            <h2 class="text-2xl font-bold">${data.date}</h2>
            <span class="text-sm">${regime} · ${data.universe.name}</span>
          </div>
          ${data.high_conviction.length > 0 ? `
            <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 mb-4">
              <p class="text-sm font-semibold text-orange-900 mb-2">⭐ High Conviction (${data.high_conviction.length})</p>
              <div class="flex flex-wrap gap-2">${hc}</div>
            </div>
          ` : ''}
          ${sections}
        </div>
      `;
    } catch (e) {
      detailEl.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded">โหลดข้อมูลล้มเหลว: ${e.message}</div>`;
    }
  }

  (async () => {
    const dates = await App.loadHistory();
    document.getElementById("loading").classList.add("hidden");

    if (dates.length === 0) {
      document.getElementById("empty").classList.remove("hidden");
      return;
    }

    const list = document.getElementById("dates-list");
    list.classList.remove("hidden");
    list.innerHTML = dates.map(d => `
      <button onclick="loadDateDetail('${d}')"
              class="w-full text-left bg-white rounded-xl border border-gray-200 p-4 hover:border-green-400 hover:shadow-md transition-all">
        <div class="flex items-center justify-between">
          <div>
            <p class="font-semibold text-gray-900">${d}</p>
            <p class="text-xs text-gray-500 mt-0.5">${new Date(d).toLocaleDateString("th-TH", { weekday: "long" })}</p>
          </div>
          <span class="text-gray-400">→</span>
        </div>
      </button>
    `).join("");
  })();
</script>
</body>
</html>
